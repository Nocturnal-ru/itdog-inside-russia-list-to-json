name: Build geosite_noc.dat

on:
  schedule:
    # Каждый день в 04:00 UTC (07:00 МСК)
    - cron: '0 4 * * *'
  # Также можно запустить вручную через интерфейс GitHub
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4

      - name: Настройка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Сборка geosite_noc.dat
        run: python generate_geosite.py

      - name: Коммит и пуш обновлённого файла
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add geosite_noc.dat
          # Коммит только если файл изменился
          git diff --staged --quiet \
            && echo "Файл не изменился, коммит не нужен." \
            || git commit -m "chore: update geosite_noc.dat [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
