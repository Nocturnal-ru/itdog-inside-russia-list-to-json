name: Generate delta.lst/duplicates.lst

on:
  schedule:
    - cron: "0 3 * * *"   # каждый день в 03:00 UTC
  workflow_dispatch:       # ручной запуск через интерфейс GitHub

jobs:
  update-delta:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run check_ITDdomains.py
        run: python scripts/check_ITDdomains.py

      - name: Commit and push delta.lst and duplicates.lst
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add delta.lst duplicates.lst
          # коммитим только если файл изменился
          git diff --cached --quiet || git commit -m "chore: update delta.lst [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
