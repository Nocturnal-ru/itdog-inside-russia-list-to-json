name: Update delta.lst

on:
  schedule:
    - cron: "0 3 * * *"   # каждый день в 03:00 UTC — меняй под себя
  workflow_dispatch:       # ручной запуск через интерфейс GitHub

jobs:
  update-delta:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # <-- добавлено

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run check_domains.py
        run: python check_domains.py

      - name: Commit and push delta.lst
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add delta.lst
          # коммитим только если файл изменился
          git diff --cached --quiet || git commit -m "chore: update delta.lst [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
